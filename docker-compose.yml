services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: gridx-mqtt
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_data:/mosquitto/data
    networks:
      - gridx-infra-network

  redis:
    image: redis:7-alpine
    container_name: gridx-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - gridx-infra-network

  postgres:
    image: postgres:16-alpine
    container_name: gridx-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command: >
      postgres
      -c docker_env.AUTH_SERVICE_USER=${AUTH_SERVICE_USER}
      -c docker_env.AUTH_SERVICE_PASSWORD=${AUTH_SERVICE_PASSWORD}
      -c docker_env.ORDER_SERVICE_USER=${ORDER_SERVICE_USER}
      -c docker_env.ORDER_SERVICE_PASSWORD=${ORDER_SERVICE_PASSWORD}
      -c docker_env.BILLING_SERVICE_USER=${BILLING_SERVICE_USER}
      -c docker_env.BILLING_SERVICE_PASSWORD=${BILLING_SERVICE_PASSWORD}
      -c docker_env.NOTIFICATION_SERVICE_USER=${NOTIFICATION_SERVICE_USER}
      -c docker_env.NOTIFICATION_SERVICE_PASSWORD=${NOTIFICATION_SERVICE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d
    networks:
      - gridx-infra-network

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: gridx-timescaledb
    ports:
      - "${TIMESCALE_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${TIMESCALE_USER}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD}
      POSTGRES_DB: ${TIMESCALE_DB}
    command: >
      postgres
      -c docker_env.MARKET_TICKER_SERVICE_USER=${MARKET_TICKER_SERVICE_USER}
      -c docker_env.MARKET_TICKER_SERVICE_PASSWORD=${MARKET_TICKER_SERVICE_PASSWORD}
      -c docker_env.IOT_SERVICE_USER=${IOT_SERVICE_USER}
      -c docker_env.IOT_SERVICE_PASSWORD=${IOT_SERVICE_PASSWORD}
      -c docker_env.AI_SERVICE_USER=${AI_SERVICE_USER}
      -c docker_env.AI_SERVICE_PASSWORD=${AI_SERVICE_PASSWORD}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./init-scripts/timescaledb:/docker-entrypoint-initdb.d
    networks:
      - gridx-infra-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: gridx-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://gridx-kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@gridx-kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics --bootstrap-server gridx-kafka:29092 --list >/dev/null 2>&1"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - gridx-infra-network

  kafka-connect:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gridx-kafka-connect
    depends_on:
      - kafka
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: 'gridx-kafka:29092'
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: gridx-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: gridx-connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: gridx-connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: gridx-connect-status
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_PLUGIN_PATH: '/usr/share/java,/usr/share/confluent-hub-components'
    networks:
      - gridx-infra-network
      
volumes:
  mosquitto_data:   
    driver: local            
  redis_data:
    driver: local
  postgres_data:
    driver: local
  timescaledb_data:
    driver: local
  kafka_data:
    driver: local
  connect_plugins:
    driver: local

networks:
  gridx-infra-network:
    driver: bridge