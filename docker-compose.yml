services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: gridx-mqtt
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_data:/mosquitto/data
    networks:
      - gridx-infra-network

  redis:
    image: redis:7-alpine
    container_name: gridx-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - gridx-infra-network

  postgres:
    image: postgres:16-alpine
    container_name: gridx-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command: >
      postgres
      -c docker_env.AUTH_SERVICE_USER=${AUTH_SERVICE_USER}
      -c docker_env.AUTH_SERVICE_PASSWORD=${AUTH_SERVICE_PASSWORD}
      -c docker_env.ORDER_SERVICE_USER=${ORDER_SERVICE_USER}
      -c docker_env.ORDER_SERVICE_PASSWORD=${ORDER_SERVICE_PASSWORD}
      -c docker_env.BILLING_SERVICE_USER=${BILLING_SERVICE_USER}
      -c docker_env.BILLING_SERVICE_PASSWORD=${BILLING_SERVICE_PASSWORD}
      -c docker_env.NOTIFICATION_SERVICE_USER=${NOTIFICATION_SERVICE_USER}
      -c docker_env.NOTIFICATION_SERVICE_PASSWORD=${NOTIFICATION_SERVICE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d
    networks:
      - gridx-infra-network

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: gridx-timescaledb
    ports:
      - "${TIMESCALE_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${TIMESCALE_USER}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD}
      POSTGRES_DB: ${TIMESCALE_DB}
    command: >
      postgres
      -c docker_env.MARKET_TICKER_SERVICE_USER=${MARKET_TICKER_SERVICE_USER}
      -c docker_env.MARKET_TICKER_SERVICE_PASSWORD=${MARKET_TICKER_SERVICE_PASSWORD}
      -c docker_env.IOT_SERVICE_USER=${IOT_SERVICE_USER}
      -c docker_env.IOT_SERVICE_PASSWORD=${IOT_SERVICE_PASSWORD}
      -c docker_env.AI_SERVICE_USER=${AI_SERVICE_USER}
      -c docker_env.AI_SERVICE_PASSWORD=${AI_SERVICE_PASSWORD}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./init-scripts/timescaledb:/docker-entrypoint-initdb.d
    networks:
      - gridx-infra-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: gridx-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - gridx-infra-network

volumes:
  mosquitto_data:   
    driver: local            
  redis_data:
    driver: local
  postgres_data:
    driver: local
  timescaledb_data:
    driver: local
  kafka_data:
    driver: local

networks:
  gridx-infra-network:
    driver: bridge